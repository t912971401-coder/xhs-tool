<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>小红书月嫂获客内容生成助手</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
}

body{
    background:#111;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* 左侧 */
.left-panel{
    width:42%;
    background:#181818;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #333;
}

.right-panel{
    flex:1;
    background:#0f0f0f;
    padding:20px;
    overflow-y:auto;
}

/* 标题 */
.header{
    margin-bottom:20px;
}

.header h1{
    color:#ff2442;
    font-size:28px;
    margin-bottom:10px;
}

.header p{
    color:#999;
}

/* 卡片 */
.card{
    background:#1f1f1f;
    border-radius:16px;
    padding:18px;
    margin-bottom:18px;
    border:1px solid #2a2a2a;
}

.card h2{
    color:#ff2442;
    font-size:18px;
    margin-bottom:15px;
}

input, textarea, select{
    width:100%;
    background:#111;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    color:#fff;
    margin-bottom:12px;
}

textarea{
    resize:vertical;
}

button{
    background:#ff2442;
    color:#fff;
    border:none;
    padding:12px 16px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
    transform:translateY(-1px);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
    transform:none;
}

.btn-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.topic-box{
    background:#111;
    border:1px solid #333;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.2s;
}

.topic-box:hover{
    border-color:#ff2442;
    background:#1b1b1b;
}

.topic-box.selected{
    border-color:#ff2442;
    background:#1b1b1b;
    box-shadow:0 0 0 1px #ff2442;
}

/* 手机预览 */
.phone{
    width:390px;
    margin:auto;
    background:#fff;
    color:#111;
    border-radius:40px;
    padding:20px;
    min-height:760px;
}

.phone-header{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
    color:#ff2442;
}

/* ---- 卡片渲染 ---- */
.card-render{
    border-radius:24px;
    padding:24px 20px 20px;
    min-height:640px;
    display:flex;
    flex-direction:column;
    transition:all 0.3s;
    position:relative;
    overflow:hidden;
}

/* 模板颜色 */
.card-render.style-pink{
    background:linear-gradient(135deg,#ffe5ec,#fff0f5,#fff5f5);
    color:#4a1525;
}

.card-render.style-clean{
    background:#fff;
    color:#1a1a1a;
    border:2px solid #f0f0f0;
}

.card-render.style-dark{
    background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);
    color:#e0e0e0;
}

.card-render.style-warm{
    background:linear-gradient(160deg,#fef9f0,#fdf3e0,#fce4c8);
    color:#5c3d2e;
}

.card-badge{
    display:inline-block;
    padding:6px 16px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
    margin-bottom:16px;
    width:fit-content;
    pointer-events:none;
}

.style-pink .card-badge{ background:#ff2442;color:#fff; }
.style-clean .card-badge{ background:#1a1a1a;color:#fff; }
.style-dark .card-badge{ background:linear-gradient(135deg,#e94560,#ff6b6b);color:#fff; }
.style-warm .card-badge{ background:#d4946a;color:#fff; }

.card-title{
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:14px;
    outline:none;
    border-radius:6px;
    padding:2px 4px;
    margin-left:-4px;
}

.card-title:focus{
    background:rgba(255,255,255,0.3);
    box-shadow:0 0 0 2px rgba(255,36,66,0.4);
}

.card-divider{
    height:3px;
    width:60px;
    border-radius:4px;
    margin-bottom:18px;
}

.style-pink .card-divider{ background:#ff2442; }
.style-clean .card-divider{ background:#333; }
.style-dark .card-divider{ background:linear-gradient(90deg,#e94560,#ff6b6b); }
.style-warm .card-divider{ background:#c4845a; }

.card-body{
    flex:1;
    font-size:16px;
    line-height:2;
    white-space:pre-wrap;
    outline:none;
    border-radius:6px;
    padding:2px 4px;
    margin-left:-4px;
}

.card-body:focus{
    background:rgba(255,255,255,0.3);
    box-shadow:0 0 0 2px rgba(255,36,66,0.4);
}

/* 话题标签独立面板 */
.tags-panel{
    margin-top:16px;
    background:#fff;
    border-radius:16px;
    padding:14px 16px;
}

.tags-label{
    font-size:12px;
    color:#999;
    margin-bottom:8px;
}

.tags-list{
    font-size:13px;
    line-height:2;
    color:#ff2442;
    outline:none;
    border-radius:6px;
    padding:2px 4px;
    margin-left:-4px;
}

.tags-list:focus{
    background:rgba(255,36,66,0.08);
    box-shadow:0 0 0 2px rgba(255,36,66,0.2);
}

/* Logo在卡片上可拖动 */
.card-logo{
    position:absolute;
    pointer-events:auto;
    cursor:grab;
    user-select:none;
    -webkit-user-drag:none;
}

.card-logo:active{
    cursor:grabbing;
}

.template-btn{
    padding:8px 14px;
    font-size:12px;
    background:#333;
    color:#aaa;
    border:1px solid #444;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.template-btn.active{
    background:#ff2442;
    color:#fff;
    border-color:#ff2442;
}

.template-btn:hover{
    border-color:#ff2442;
}

.history-item{
    background:#111;
    border:1px solid #333;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.history-item:hover{
    border-color:#ff2442;
}

.link-btn{
    display:inline-block;
    text-decoration:none;
    margin-top:15px;
    background:#ff2442;
    color:#fff;
    padding:12px 20px;
    border-radius:10px;
}

.error-msg{
    color:#ff6b6b;
    font-size:13px;
    margin-top:8px;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}

/* 图片点击放大灯箱 */
.lightbox{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.92);
    z-index:9999;
    align-items:center;
    justify-content:center;
    cursor:zoom-out;
}

.lightbox.show{
    display:flex;
}

.lightbox img{
    max-width:90vw;
    max-height:90vh;
    border-radius:12px;
    object-fit:contain;
    cursor:default;
}

.lightbox-close{
    position:fixed;
    top:20px;
    right:30px;
    color:#fff;
    font-size:36px;
    cursor:pointer;
    z-index:10000;
    line-height:1;
}
</style>
</head>

<body>

<div class="container">

    <!-- 左侧 -->
    <div class="left-panel">

        <div class="header">
            <h1>月嫂行业 · 小红书内容助手</h1>
            <p>AI生成爆款小红书图文内容</p>
        </div>

        <!-- API -->
        <div class="card">
            <h2>DeepSeek API</h2>
            <input type="password" id="apiKey" placeholder="输入 DeepSeek API Key">
        </div>

        <!-- 选题 -->
        <div class="card">
            <h2>爆款选题推荐</h2>

            <select id="topicType">
                <option value="all">全部类型</option>
                <option value="避坑类">避坑类</option>
                <option value="攻略类">攻略类</option>
                <option value="案例类">案例类</option>
                <option value="对比类">对比类</option>
                <option value="干货类">干货类</option>
            </select>

            <div id="topicList"></div>

            <div class="btn-group">
                <button onclick="refreshTopics()">换一批</button>
            </div>

            <textarea id="customTopic" rows="3" placeholder="或者输入自定义选题"></textarea>

            <button id="generateBtn" style="width:100%;" onclick="generateContent()">
                AI生成小红书文案
            </button>

            <div id="generateError" class="error-msg"></div>
        </div>

        <!-- 卡片模板 -->
        <div class="card">
            <h2>文字卡片模板</h2>

            <p style="color:#999;font-size:13px;margin-bottom:12px;">
                选择卡片样式，文案自动排版
            </p>

            <div class="btn-group" id="templateBtns" style="margin-bottom:14px;">
                <button class="template-btn active" data-style="pink" onclick="switchTemplate('pink',this)">ins少女粉</button>
                <button class="template-btn" data-style="clean" onclick="switchTemplate('clean',this)">极简白</button>
                <button class="template-btn" data-style="dark" onclick="switchTemplate('dark',this)">高端暗色</button>
                <button class="template-btn" data-style="warm" onclick="switchTemplate('warm',this)">温暖奶油</button>
            </div>

            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                <label style="white-space:nowrap;color:#ccc;font-size:13px;">品牌Logo</label>
                <input type="file" id="logoFile" accept="image/png,image/svg+xml,image/webp" onchange="uploadLogo(event)" style="flex:1;margin-bottom:0;">
                <span id="logoStatus" style="font-size:12px;color:#666;">未上传</span>
            </div>

            <div id="logoControls" style="display:none;margin-bottom:14px;">
                <div style="color:#999;font-size:12px;margin-bottom:6px;">Logo位置</div>
                <div class="btn-group" style="margin-bottom:8px;">
                    <button class="template-btn logo-pos-btn active" data-pos="tl" onclick="setLogoPos('tl',this)">左上</button>
                    <button class="template-btn logo-pos-btn" data-pos="tr" onclick="setLogoPos('tr',this)">右上</button>
                    <button class="template-btn logo-pos-btn" data-pos="bc" onclick="setLogoPos('bc',this)">底部居中</button>
                    <button class="template-btn logo-pos-btn" data-pos="ct" onclick="setLogoPos('ct',this)">居中水印</button>
                    <button class="template-btn logo-pos-btn" data-pos="free" onclick="setLogoPos('free',this)">✋ 自定义拖动</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span style="color:#999;font-size:12px;">大小</span>
                    <input type="range" id="logoSize" min="60" max="260" value="140" oninput="updateLogoStyle()" style="flex:1;margin:0;">
                    <span style="color:#999;font-size:12px;">透明度</span>
                    <input type="range" id="logoOpacity" min="20" max="100" value="85" oninput="updateLogoStyle()" style="flex:1;margin:0;">
                </div>
            </div>

            <button id="exportCardBtn" style="width:100%;margin-bottom:8px;" onclick="exportCard()">
                📸 导出卡片图片
            </button>

            <p style="color:#777;font-size:11px;">点击卡片上的文字可直接编辑 | 导出1080×1440高清图</p>
        </div>

        <!-- 发布 -->
        <div class="card">
            <h2>发布准备</h2>

            <div class="btn-group">
                <button onclick="copyTitle()">复制标题</button>
                <button onclick="copyContent()">复制正文</button>
                <button onclick="copyAll()">复制全部</button>
            </div>

            <a class="link-btn"
               href="https://creator.xiaohongshu.com/"
               target="_blank">
                去小红书发布
            </a>
        </div>

        <!-- 历史 -->
        <div class="card">
            <h2>历史记录</h2>
            <div id="historyList"></div>
        </div>

    </div>

    <!-- 右侧 -->
    <div class="right-panel">

        <div class="phone" id="phonePreview">

            <div class="phone-header">
                小红书预览
            </div>

            <!-- 卡片渲染区 -->
            <div class="card-render" id="cardRender">
                <div class="card-badge" id="cardBadge">干货分享</div>
                <div class="card-title" id="cardTitle" contenteditable="true">AI生成的标题会显示在这里</div>
                <div class="card-divider"></div>
                <div class="card-body" id="cardBody" contenteditable="true">正文内容预览...</div>
                <img class="card-logo" id="cardLogo" src="" alt="logo"
                     style="display:none;position:absolute;">
            </div>

            <!-- 话题标签（独立展示，不出现在卡片图中） -->
            <div class="tags-panel" id="tagsPanel">
                <div class="tags-label">🏷️ 话题标签</div>
                <div class="tags-list" id="cardTags" contenteditable="true">#月嫂 #育儿</div>
            </div>

        </div>

    </div>

</div>

<canvas id="logoCanvas" style="display:none;"></canvas>

<!-- 图片放大灯箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" alt="预览大图" onclick="event.stopPropagation()">
</div>

<script>

/* =========================
   API Key 持久化
========================= */

const apiKeyEl = document.getElementById("apiKey");
const savedKey = localStorage.getItem("deepseek_api_key");
if(savedKey){
    apiKeyEl.value = savedKey;
}
apiKeyEl.addEventListener("input", ()=>{
    localStorage.setItem("deepseek_api_key", apiKeyEl.value);
});

/* =========================
   图片放大灯箱
========================= */

function openLightbox(src){
    document.getElementById("lightboxImg").src = src;
    document.getElementById("lightbox").classList.add("show");
}

function closeLightbox(){
    document.getElementById("lightbox").classList.remove("show");
}

document.addEventListener("keydown", (e)=>{
    if(e.key === "Escape") closeLightbox();
});

/* =========================
   选题库
========================= */

const topics = [

{type:"避坑类", title:"请月嫂千万别只看价格！很多家庭都踩坑了"},
{type:"避坑类", title:"第一次找月嫂，这5个细节不问等于白请"},
{type:"避坑类", title:"为什么很多宝妈请完月嫂后后悔？"},
{type:"避坑类", title:"月嫂面试最容易忽略的3个问题"},
{type:"避坑类", title:"便宜月嫂和高端月嫂差距到底有多大？"},

{type:"攻略类", title:"2026最新月嫂挑选攻略"},
{type:"攻略类", title:"新手爸妈怎么找到靠谱月嫂？"},
{type:"攻略类", title:"月嫂怎么选才不踩雷？"},
{type:"攻略类", title:"找月嫂一定要提前多久？"},
{type:"攻略类", title:"月嫂面试标准流程分享"},

{type:"案例类", title:"客户花12800请月嫂后真实体验"},
{type:"案例类", title:"90后宝妈找月嫂全过程"},
{type:"案例类", title:"一个月嫂让全家轻松了多少"},
{type:"案例类", title:"真实案例：请对月嫂真的太重要了"},
{type:"案例类", title:"客户为什么连续二胎还找同一个月嫂"},

{type:"对比类", title:"住月子中心还是请月嫂？"},
{type:"对比类", title:"金牌月嫂和普通月嫂差别在哪"},
{type:"对比类", title:"请月嫂VS老人带娃"},
{type:"对比类", title:"线上找月嫂和线下找月嫂哪个好"},
{type:"对比类", title:"熟人介绍月嫂靠谱吗？"},

{type:"干货类", title:"月嫂每天都在做什么？"},
{type:"干货类", title:"月嫂服务到底包含哪些内容"},
{type:"干货类", title:"请月嫂前一定要知道的行业内幕"},
{type:"干货类", title:"为什么现在越来越多人请月嫂"},
{type:"干货类", title:"高级月嫂都有哪些标准"}

];

let currentTopic = "";

/* =========================
   刷新选题
========================= */

function refreshTopics(){

    const type = document.getElementById("topicType").value;

    let filtered = type === "all"
        ? topics
        : topics.filter(t=>t.type===type);

    filtered = filtered.sort(()=>0.5 - Math.random());

    const picked = filtered.slice(0,3);

    const box = document.getElementById("topicList");

    box.innerHTML = "";

    picked.forEach(item=>{

        const div = document.createElement("div");

        div.className = "topic-box";

        div.innerHTML = `
            <strong>[${item.type}]</strong><br>
            ${item.title}
        `;

        div.onclick = ()=>{
            currentTopic = item.title;
            document.getElementById("customTopic").value = item.title;
            // 高亮选中
            document.querySelectorAll(".topic-box").forEach(el=>el.classList.remove("selected"));
            div.classList.add("selected");
        };

        box.appendChild(div);

    });

}

refreshTopics();

/* =========================
   DeepSeek 生成
========================= */

async function generateContent(){

    const apiKey = document.getElementById("apiKey").value.trim();

    const topic = document.getElementById("customTopic").value.trim();

    const btn = document.getElementById("generateBtn");
    const errDiv = document.getElementById("generateError");
    errDiv.innerText = "";

    if(!apiKey){
        errDiv.innerText = "请输入 DeepSeek API Key";
        return;
    }

    if(!topic){
        errDiv.innerText = "请输入选题";
        return;
    }

    btn.disabled = true;
    btn.innerText = "AI生成中...";

    document.getElementById("cardTitle").innerText = "生成中...";
    document.getElementById("cardBody").innerText = "AI正在写文案...";
    document.getElementById("cardTags").innerText = "";

    const prompt = `
你是一名专业的小红书月嫂行业运营专家。

请围绕这个选题：

《${topic}》

生成一篇小红书爆款图文文案。

要求：

1、输出：
- 爆款标题
- 正文（500字以内）
- 10个标签

2、风格：
- 小红书风格
- 有emoji
- 口语化
- 有真实感
- 分段清晰
- 结尾引导互动

3、目标：
- 吸引宝妈咨询月嫂
- 提升信任感

请严格按以下格式输出：

【标题】
xxx

【正文】
xxx

【标签】
#xxx #xxx
`;

    try{

        const response = await fetch(
            "https://api.deepseek.com/chat/completions",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + apiKey
                },
                body:JSON.stringify({
                    model:"deepseek-chat",
                    messages:[
                        {
                            role:"user",
                            content:prompt
                        }
                    ],
                    temperature:0.9
                })
            }
        );

        if(!response.ok){
            const errData = await response.json().catch(()=>({}));
            throw new Error(errData.error?.message || `请求失败 (${response.status})`);
        }

        const data = await response.json();

        if(!data.choices || !data.choices[0] || !data.choices[0].message){
            throw new Error("API返回格式异常");
        }

        const text = data.choices[0].message.content;

        parseContent(text);

    }catch(err){

        errDiv.innerText = "生成失败：" + err.message;
        document.getElementById("cardTitle").innerText = "生成失败";
        document.getElementById("cardBody").innerText = "请检查API Key或网络连接";

    }finally{

        btn.disabled = false;
        btn.innerText = "AI生成小红书文案";

    }

}

/* =========================
   解析文案
========================= */

function parseContent(text){

    if(!text || typeof text !== "string"){
        document.getElementById("cardTitle").innerText = "解析失败";
        document.getElementById("cardBody").innerText = "AI未返回有效内容";
        return;
    }

    const titleMatch = text.match(/【标题】([\s\S]*?)【正文】/);
    const contentMatch = text.match(/【正文】([\s\S]*?)【标签】/);
    const tagMatch = text.match(/【标签】([\s\S]*)/);

    const title = titleMatch ? titleMatch[1].trim() : "（标题解析失败）";
    const content = contentMatch ? contentMatch[1].trim() : text;
    const tags = tagMatch ? tagMatch[1].trim() : "#月嫂 #育儿";

    document.getElementById("cardTitle").innerText = title;
    document.getElementById("cardBody").innerText = content;
    document.getElementById("cardTags").innerText = tags;

    updateCardRender();

    saveHistory({
        title,
        content,
        tags
    });

}

/* =========================
   文字卡片模板
========================= */

let currentStyle = "pink";
let logoDataUrl = null;
let logoPos = "tl";   // tl | tr | bc | ct | free
let logoSize = 140;   // px (on 390px card)
let logoOpacity = 0.85;
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let logoStartX = 0, logoStartY = 0;
let dragSetupDone = false;

function switchTemplate(style, btn){
    currentStyle = style;
    document.querySelectorAll("#templateBtns .template-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    updateCardRender();
}

function setLogoPos(pos, btn){
    logoPos = pos;
    document.querySelectorAll(".logo-pos-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    updateLogoStyle();
}

function updateLogoStyle(){
    const logoEl = document.getElementById("cardLogo");
    if(!logoEl || !logoDataUrl) return;
    logoSize = parseInt(document.getElementById("logoSize").value);
    logoOpacity = parseInt(document.getElementById("logoOpacity").value) / 100;
    logoEl.style.width = logoSize + "px";
    logoEl.style.opacity = logoOpacity;
    if(logoPos !== "free") positionLogo();
}

function positionLogo(){
    const logoEl = document.getElementById("cardLogo");
    const card = document.getElementById("cardRender");
    if(!logoEl || !card || !logoDataUrl) return;

    const cardW = card.offsetWidth;
    const cardH = card.offsetHeight;
    const pad = 20;
    const w = logoSize;

    let left, top;
    switch(logoPos){
        case "tl": left = pad; top = pad; break;
        case "tr": left = cardW - w - pad; top = pad; break;
        case "bc": left = (cardW - w) / 2; top = cardH - w - pad - 24; break;
        case "ct": left = (cardW - w) / 2; top = (cardH - w) / 2; break;
        case "free": return; // 保持拖动后的位置
        default:  left = pad; top = pad;
    }
    logoEl.style.left = left + "px";
    logoEl.style.top = top + "px";
}

function uploadLogo(event){
    const file = event.target.files[0];
    if(!file) return;
    if(!file.type.startsWith("image/")){
        alert("请选择图片文件");
        return;
    }
    const reader = new FileReader();
    reader.onload = function(e){
        logoDataUrl = e.target.result;
        document.getElementById("logoStatus").innerText = "已上传 ✓";
        document.getElementById("logoStatus").style.color = "#4caf50";
        document.getElementById("logoControls").style.display = "block";
        updateCardRender();
        setupLogoDrag();
    };
    reader.onerror = function(){
        alert("Logo读取失败");
    };
    reader.readAsDataURL(file);
}

function setupLogoDrag(){
    if(dragSetupDone) return;
    dragSetupDone = true;
    const logoEl = document.getElementById("cardLogo");
    if(!logoEl) return;

    logoEl.addEventListener("mousedown", onLogoDragStart);
    logoEl.addEventListener("touchstart", onLogoDragStart, {passive:false});

    document.addEventListener("mousemove", onLogoDragMove);
    document.addEventListener("touchmove", onLogoDragMove, {passive:false});
    document.addEventListener("mouseup", onLogoDragEnd);
    document.addEventListener("touchend", onLogoDragEnd);
}

function onLogoDragStart(e){
    e.preventDefault();
    isDragging = true;
    const pt = e.touches ? e.touches[0] : e;
    dragStartX = pt.clientX;
    dragStartY = pt.clientY;
    const logoEl = document.getElementById("cardLogo");
    logoStartX = parseInt(logoEl.style.left) || 0;
    logoStartY = parseInt(logoEl.style.top) || 0;
    logoEl.style.cursor = "grabbing";
}

function onLogoDragMove(e){
    if(!isDragging) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - dragStartX;
    const dy = pt.clientY - dragStartY;

    const card = document.getElementById("cardRender");
    const logoEl = document.getElementById("cardLogo");
    const maxX = card.offsetWidth - logoEl.offsetWidth;
    const maxY = card.offsetHeight - logoEl.offsetHeight;

    let newX = logoStartX + dx;
    let newY = logoStartY + dy;
    newX = Math.max(0, Math.min(newX, maxX));
    newY = Math.max(0, Math.min(newY, maxY));

    logoEl.style.left = newX + "px";
    logoEl.style.top = newY + "px";
    logoPos = "free";
    document.querySelectorAll(".logo-pos-btn").forEach(b=>b.classList.remove("active"));
    const freeBtn = document.querySelector(".logo-pos-btn[data-pos='free']");
    if(freeBtn) freeBtn.classList.add("active");
}

function onLogoDragEnd(){
    if(!isDragging) return;
    isDragging = false;
    const logoEl = document.getElementById("cardLogo");
    if(logoEl) logoEl.style.cursor = "grab";
}

function updateCardRender(){
    const render = document.getElementById("cardRender");
    render.className = "card-render style-" + currentStyle;

    // 根据内容自动判断分类角标
    const title = document.getElementById("cardTitle").innerText;
    const badgeMap = {
        "避坑":"避坑指南","攻略":"超全攻略","案例":"真实案例",
        "对比":"对比分析","干货":"干货分享","月嫂":"月嫂知识"
    };
    let badge = "干货分享";
    for(const [k,v] of Object.entries(badgeMap)){
        if(title.includes(k)){ badge = v; break; }
    }
    document.getElementById("cardBadge").innerText = badge;

    // Logo
    const logoEl = document.getElementById("cardLogo");
    if(logoDataUrl){
        logoEl.src = logoDataUrl;
        logoEl.style.display = "block";
        logoEl.style.width = logoSize + "px";
        logoEl.style.opacity = logoOpacity;
        logoEl.style.cursor = "grab";
        positionLogo();
    } else {
        logoEl.style.display = "none";
    }
}

/* =========================
   导出卡片图片（Canvas 2D 渲染）
   内容过长时自动分页，多图顺序下载后可直接拼合
========================= */

function resetExportBtn(btn){
    btn.disabled = false;
    btn.innerText = "📸 导出卡片图片";
}

function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

function logoLoadPromise(imgSrc, ctx, logoLeft, logoTop, logoW, logoAlpha){
    return new Promise((resolve)=>{
        const img = new Image();
        let settled = false;
        const done = ()=>{
            if(settled) return;
            settled = true;
            clearTimeout(timer);
            resolve();
        };
        img.onload = ()=>{
            ctx.globalAlpha = logoAlpha;
            const logoH = img.naturalHeight * (logoW / img.naturalWidth);
            ctx.drawImage(img, logoLeft, logoTop, logoW, logoH);
            ctx.globalAlpha = 1;
            done();
        };
        img.onerror = ()=>{
            ctx.globalAlpha = 1;
            done();
        };
        img.src = imgSrc;
        const timer = setTimeout(()=>{ ctx.globalAlpha = 1; done(); }, 4000);
    });
}

function canvasToBlobAsync(canvas){
    return new Promise((resolve, reject)=>{
        canvas.toBlob((blob)=>{
            if(blob) resolve(blob);
            else reject(new Error("无法生成图片"));
        }, "image/png");
    });
}

async function exportCard(){

    const title = document.getElementById("cardTitle").innerText.trim();
    const content = document.getElementById("cardBody").innerText.trim();

    if(!content || content.includes("会显示在这里") || content.includes("生成中")){
        alert("请先生成文案内容");
        return;
    }

    const btn = document.getElementById("exportCardBtn");
    btn.disabled = true;
    btn.innerText = "正在计算分页...";

    try {

    const W = 1080, H = 1440;
    const canvas = document.getElementById("logoCanvas");

    const srcCard = document.getElementById("cardRender");
    const srcW = srcCard.offsetWidth || 350;
    const scale = W / srcW;

    const clr = {
        pink:  {c1:"#ffe5ec",c2:"#fff0f5",c3:"#fff5f5",txt:"#4a1525",badgeBg:"#ff2442",badgeC:"#fff",div:"#ff2442"},
        clean: {c1:"#ffffff",c2:"#ffffff",c3:"#ffffff",txt:"#1a1a1a",badgeBg:"#1a1a1a",badgeC:"#fff",div:"#333"},
        dark:  {c1:"#1a1a2e",c2:"#16213e",c3:"#0f3460",txt:"#e0e0e0",badgeBg:"#e94560",badgeC:"#fff",div:"#e94560"},
        warm:  {c1:"#fef9f0",c2:"#fdf3e0",c3:"#fce4c8",txt:"#5c3d2e",badgeBg:"#d4946a",badgeC:"#fff",div:"#c4845a"}
    }[currentStyle];

    const pad = Math.round(24 * scale);
    const padX = Math.round(20 * scale);
    const maxTW = W - padX * 2;
    const timestamp = Date.now();

    // ---- 共用尺寸 ----
    const badge = document.getElementById("cardBadge").innerText;
    const badgeFontSize = Math.round(13 * scale);
    const badgePadV = Math.round(6 * scale);
    const badgePadH = Math.round(16 * scale);
    const badgeRadius = Math.round(20 * scale);
    const titleFontSize = Math.round(22 * scale);
    const titleLineH = Math.round(22 * 1.5 * scale);
    const divW = Math.round(60 * scale);
    const divH = Math.round(4 * scale);
    const divRadius = Math.round(3 * scale);
    const bodyFontSize = Math.round(16 * scale);
    const bodyLineH = Math.round(16 * 2.1 * scale);

    // ---- 预计算标题行和正文行 ----
    canvas.width = W; canvas.height = H;
    const ctx0 = canvas.getContext("2d");
    ctx0.font = `bold ${titleFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
    const titleLines = wrapLines(ctx0, title, maxTW);
    ctx0.font = `${bodyFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
    const allBodyLines = wrapLines(ctx0, content, maxTW);

    // 计算页首高度（badge + title + divider 占用的 Y）
    ctx0.font = `bold ${badgeFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
    const badgeTextW = ctx0.measureText(badge).width;
    const badgeW = badgeTextW + badgePadH * 2;
    const badgeH = badgeFontSize + badgePadV * 2;
    const headerH = badgeH + Math.round(16 * scale)
                  + titleLines.length * titleLineH
                  + Math.round(14 * scale)
                  + divH + Math.round(18 * scale);

    // 第 1 页正文可用高度；后续页正文可用高度
    const bodyStartY1 = pad + headerH;
    const bodyAvailH1 = H - bodyStartY1 - pad * 1.5;
    const bodyAvailHSub = H - pad * 3;
    const linesPerPage1 = Math.max(1, Math.floor(bodyAvailH1 / bodyLineH));
    const linesPerPageSub = Math.max(1, Math.floor(bodyAvailHSub / bodyLineH));

    // ---- 将正文行按自然段落分组 ----
    const paragraphs = [];
    let curPara = [];
    for(const line of allBodyLines){
        if(line === ""){
            if(curPara.length > 0){ paragraphs.push(curPara); curPara = []; }
        } else {
            curPara.push(line);
        }
    }
    if(curPara.length > 0) paragraphs.push(curPara);

    // ---- 按段落分页：尽量将完整段落放在同一页 ----
    const pages = [];
    let pageLines = [];
    let pageLineCount = 0;
    let isFirst = true;

    function flushPage(){
        if(pageLines.length === 0) return;
        while(pageLines.length > 0 && pageLines[pageLines.length-1] === "") pageLines.pop();
        pages.push({ first: isFirst, bodyLines: [...pageLines] });
        isFirst = false;
        pageLines = [];
        pageLineCount = 0;
    }

    for(const para of paragraphs){
        const maxLines = isFirst ? linesPerPage1 : linesPerPageSub;
        // 需要行数 = 段落本身 + 段间空行（非首页或已有内容时）
        const need = pageLineCount > 0 ? para.length + 1 : para.length;

        if(pageLineCount + need <= maxLines){
            if(pageLineCount > 0){ pageLines.push(""); pageLineCount++; }
            pageLines.push(...para);
            pageLineCount += para.length;
        } else {
            if(pageLines.length > 0) flushPage();
            const availNow = isFirst ? linesPerPage1 : linesPerPageSub;
            if(para.length > availNow){
                let pc = 0;
                while(pc < para.length){
                    const avail = isFirst ? linesPerPage1 : linesPerPageSub;
                    const chunk = para.slice(pc, pc + avail);
                    pageLines = chunk;
                    pageLineCount = chunk.length;
                    pc += chunk.length;
                    if(pc < para.length) flushPage();
                }
            } else {
                pageLines = [...para];
                pageLineCount = para.length;
            }
        }
    }
    flushPage();

    const totalPages = pages.length;

    // ---- 逐页绘制并下载 ----
    for(let pi = 0; pi < totalPages; pi++){
        const page = pages[pi];
        btn.innerText = `正在导出 ${pi+1}/${totalPages}...`;

        canvas.width = W; canvas.height = H;  // 清空
        const ctx = canvas.getContext("2d");

        // 背景
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, clr.c1);
        grad.addColorStop(0.5, clr.c2);
        grad.addColorStop(1, clr.c3);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        let y = pad;

        if(page.first){
            // ---- 角标 ----
            ctx.fillStyle = clr.badgeBg;
            ctx.beginPath();
            roundRect(ctx, padX, y, badgeW, badgeH, badgeRadius);
            ctx.fill();
            ctx.fillStyle = clr.badgeC;
            ctx.font = `bold ${badgeFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillText(badge, padX + badgeW / 2, y + badgeH / 2);
            ctx.textAlign = "start";
            y += badgeH + Math.round(16 * scale);

            // ---- 标题 ----
            ctx.fillStyle = clr.txt;
            ctx.font = `bold ${titleFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
            ctx.textBaseline = "top";
            for(const line of titleLines){
                ctx.fillText(line, padX, y);
                y += titleLineH;
            }
            y += Math.round(14 * scale);

            // ---- 分割线 ----
            ctx.fillStyle = clr.div;
            ctx.beginPath();
            roundRect(ctx, padX, y, divW, divH, divRadius);
            ctx.fill();
            y += divH + Math.round(18 * scale);
        }

        // ---- 正文 ----
        ctx.fillStyle = clr.txt;
        ctx.font = `${bodyFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.textBaseline = "top";
        for(const line of page.bodyLines){
            ctx.fillText(line, padX, y);
            y += bodyLineH;
        }

        // ---- 页码（多页时） ----
        if(totalPages > 1){
            const pageFontSize = Math.round(11 * scale);
            ctx.font = `${pageFontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
            ctx.fillStyle = clr.txt;
            ctx.globalAlpha = 0.35;
            ctx.textAlign = "right";
            ctx.textBaseline = "bottom";
            ctx.fillText(`${pi+1}/${totalPages}`, W - padX, H - pad);
            ctx.textAlign = "start";
            ctx.globalAlpha = 1;
        }

        // ---- Logo（仅首页） ----
        if(page.first && logoDataUrl){
            const logoEl = document.getElementById("cardLogo");
            if(logoEl && logoEl.style.display !== "none" && logoEl.style.left){
                const logoLeft = (parseFloat(logoEl.style.left) || 0) * scale;
                const logoTop  = (parseFloat(logoEl.style.top) || 0) * scale;
                const logoW    = logoSize * scale;
                const logoAlpha = parseFloat(logoEl.style.opacity) || 0.85;
                await logoLoadPromise(logoDataUrl, ctx, logoLeft, logoTop, logoW, logoAlpha);
            }
        }

        // 输出本页
        const blob = await canvasToBlobAsync(canvas);
        const suffix = totalPages > 1 ? `-p${pi+1}` : "";
        downloadBlob(blob, `xhs-card-${timestamp}${suffix}.png`);

        // 页间短暂间隔，让浏览器有时间处理下载
        if(pi < totalPages - 1){
            await sleep(200);
        }
    }

    btn.disabled = false;
    btn.innerText = "📸 导出卡片图片";

    } catch(err) {
        alert("导出失败：" + err.message);
        resetExportBtn(btn);
    }

}

// 辅助：圆角矩形
function roundRect(ctx, x, y, w, h, r){
    if(typeof r === "number") r = {tl:r, tr:r, br:r, bl:r};
    const maxR = Math.min(w, h) / 2;
    r = {tl:Math.min(r.tl, maxR), tr:Math.min(r.tr, maxR), br:Math.min(r.br, maxR), bl:Math.min(r.bl, maxR)};
    ctx.beginPath();
    ctx.moveTo(x + r.tl, y);
    ctx.lineTo(x + w - r.tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    ctx.lineTo(x + w, y + h - r.br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    ctx.lineTo(x + r.bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    ctx.lineTo(x, y + r.tl);
    ctx.quadraticCurveTo(x, y, x + r.tl, y);
    ctx.closePath();
}

// 辅助：Canvas 文字换行
function wrapLines(ctx, text, maxW){
    const result = [];
    const paragraphs = text.split("\n");
    for(const para of paragraphs){
        if(para === ""){ result.push(""); continue; }
        let line = "";
        for(const ch of para){
            if(ctx.measureText(line + ch).width > maxW && line.length > 0){
                result.push(line);
                line = ch;
            } else {
                line += ch;
            }
        }
        if(line) result.push(line);
    }
    return result;
}

/* =========================
   历史记录
========================= */

function saveHistory(item){

    try{
        let history = JSON.parse(
            localStorage.getItem("xhs_history") || "[]"
        );

        history.unshift(item);

        history = history.slice(0,20);

        localStorage.setItem(
            "xhs_history",
            JSON.stringify(history)
        );

        renderHistory();
    }catch(e){
        // localStorage 满了或不可用，静默失败
    }

}

function renderHistory(){

    const history = JSON.parse(
        localStorage.getItem("xhs_history") || "[]"
    );

    const box = document.getElementById("historyList");

    box.innerHTML = "";

    if(history.length === 0){
        box.innerHTML = `<div style="color:#666;text-align:center;padding:20px;">暂无历史记录</div>`;
        return;
    }

    history.forEach(item=>{

        const div = document.createElement("div");

        div.className = "history-item";

        div.innerHTML = `
            <strong>${item.title}</strong>
        `;

        div.onclick = ()=>{

            document.getElementById("cardTitle").innerText = item.title;
            document.getElementById("cardBody").innerText = item.content;
            document.getElementById("cardTags").innerText = item.tags;
            updateCardRender();

        };

        box.appendChild(div);

    });

}

renderHistory();
