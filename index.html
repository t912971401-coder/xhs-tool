<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>新媒体内容生成工具箱</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
body{background:#111;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrapper{max-width:700px;width:100%;}
.header{text-align:center;margin-bottom:40px;}
.header h1{color:#ff2442;font-size:32px;margin-bottom:8px;}
.header p{color:#888;font-size:14px;}
.tools{display:flex;flex-direction:column;gap:16px;}
.tool-card{
    background:#1f1f1f;border:1px solid #2a2a2a;border-radius:18px;
    padding:24px 28px;display:flex;align-items:center;gap:20px;
    text-decoration:none;transition:0.2s;cursor:pointer;
}
.tool-card:hover{border-color:#ff2442;transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,36,66,0.15);}
.tool-icon{font-size:42px;min-width:56px;text-align:center;}
.tool-info{flex:1;}
.tool-info h2{color:#fff;font-size:18px;margin-bottom:6px;}
.tool-info p{color:#888;font-size:13px;line-height:1.6;}
.tool-badge{display:inline-block;background:#ff244220;color:#ff2442;font-size:11px;padding:3px 10px;border-radius:12px;margin-top:6px;}
.arrow{color:#ff2442;font-size:24px;}
.footer{text-align:center;margin-top:40px;color:#555;font-size:12px;}
.footer a{color:#ff2442;text-decoration:none;}
</style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>新媒体内容生成工具箱</h1>
        <p>DeepSeek AI 驱动 · 免费生图 · 打开即用</p>
    </div>
    <div class="tools">

        <a class="tool-card" href="wechat-housekeeping-tool.html">
            <div class="tool-icon">🏠</div>
            <div class="tool-info">
                <h2>家政公司 · 公众号助手</h2>
                <p>月嫂 / 育婴师 / 养老护理 / 女性就业培训，50个选题 + 图文结合预览 + 去AI味</p>
                <span class="tool-badge">公众号</span>
            </div>
            <div class="arrow">&rarr;</div>
        </a>

        <a class="tool-card" href="xiaohongshu-yuesao-tool.html">
            <div class="tool-icon">👶</div>
            <div class="tool-info">
                <h2>月嫂行业 · 小红书助手</h2>
                <p>爆款标题 + 正文 + 标签 + AI配图，深色主题小红书风格预览</p>
                <span class="tool-badge">小红书</span>
            </div>
            <div class="arrow">&rarr;</div>
        </a>

        <a class="tool-card" href="xiaohongshu-computer-rental-tool.html">
            <div class="tool-icon">💻</div>
            <div class="tool-info">
                <h2>电脑租赁 · 小红书助手</h2>
                <p>50个电脑租赁行业选题 + DeepSeek文案 + Pollinations AI免费生图</p>
                <span class="tool-badge">小红书</span>
            </div>
            <div class="arrow">&rarr;</div>
        </a>

    </div>
    <div class="footer">
        所有数据仅保存在本地浏览器 · 需要 <a href="https://platform.deepseek.com" target="_blank">DeepSeek API Key</a>
    </div>
</div>
</body>
</html>
